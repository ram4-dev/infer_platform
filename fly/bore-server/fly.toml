# Fly.io deployment for the bore tunnel server
# This is the relay server that providers connect to with `bore local`.
#
# Deploy:
#   fly launch --config fly/bore-server/fly.toml --name infer-bore
#   fly secrets set BORE_SECRET=<strong-random-secret>
#   fly deploy --config fly/bore-server/fly.toml
#
# The bore server listens on port 7835 (control) and allocates dynamic
# ports for each tunnel session. Providers connect with:
#   bore local 11434 --to tunnel.infer.ram4.dev --secret <BORE_SECRET>
# where `tunnel.infer.ram4.dev` is a CNAME pointing to <app-name>.fly.dev.

app = "infer-bore"
primary_region = "ord"

[build]
  dockerfile = "fly/bore-server/Dockerfile"

[env]
  BORE_SECRET = ""  # Set via `fly secrets set BORE_SECRET=...`

[[services]]
  internal_port = 7835
  protocol = "tcp"

  [[services.ports]]
    port = 7835

# Bore needs a large port range for tunnel sessions.
# Fly allocates dedicated IPs for TCP services on non-standard ports.
[[services]]
  internal_port = 1024
  protocol = "tcp"
  min_machines_running = 1

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.ports]]
    # Dynamic tunnel ports — bore assigns from this range internally.
    # Expose the entire range that bore uses (1024–65535).
    port = 1024

[http_service]
  internal_port = 7835
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
